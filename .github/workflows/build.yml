name: Build webOS IPK (Final Edition)

on:
  push:
    branches:
      - main
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً إذا أردت

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Official webOS CLI
        run: npm install -g @webos-tools/cli

      - name: Prepare and Package App
        run: |
          # التأكد من وجود مجلد البناء
          mkdir -p build
          
          # عرض قائمة الملفات للتأكد من وجود appinfo.json قبل البدء
          echo "Current directory files:"
          ls -F
          
          # تنفيذ أمر بناء الحزمة
          # استخدمنا --no-minify لضمان استقرار الروابط الخارجية في ملف التعريف
          ares-package . -o ./build --no-minify

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webos-package-final
          path: build/*.ipk
          if-no-files-found: error
