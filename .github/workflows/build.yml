name: Build webOS IPK

on:
  push:
    branches:
      - main  # سيتم البناء تلقائياً عند أي رفع لملفاتك على فرع main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Official webOS CLI
        run: npm install -g @webos-tools/cli

      - name: Package App
        run: ares-package . -o ./build

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: webos-package
          path: ./build/*.ipk
