name: Build webos IPK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Install webOS CLI
        run: |
          npm install -g @lucas-it-tecnologia/webos-cli
          
      - name: Package App
        run: |
          ares-package .
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lg-app-package
          path: "*.ipk"
